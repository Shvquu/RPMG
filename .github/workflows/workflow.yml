name: Build & Release

# Wird ausgelöst wenn ein Tag gepusht wird der mit "v" beginnt (z.B. v1.0, v1.2.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    # Benötigte Berechtigungen für den GITHUB_TOKEN
    permissions:
      contents: write  # Erlaubt das Erstellen von Releases & Hochladen von Assets

    steps:

      # 1. Repository auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java 21 einrichten
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Versionsnummer aus dem Tag extrahieren (v1.0.0 → 1.0.0)
      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 4. pom.xml Version auf den Tag setzen
      - name: Set Maven Version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      # 5. Mit Maven bauen (Tests überspringen)
      - name: Build with Maven
        run: mvn clean package -DskipTests --batch-mode

      # 6. JAR-Pfad ermitteln (shade-jar hat manchmal "-shaded" Suffix)
      - name: Find JAR
        run: |
          JAR=$(find target -name "RPMG-*.jar" ! -name "*-shaded.jar" | head -1)
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_ENV

      # 7. GitHub Release erstellen und JAR hochladen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "RPMG ${{ github.ref_name }}"
          body: |
            ## 📦 RPMG ${{ github.ref_name }}

            ### Installation
            1. `.jar` Datei herunterladen
            2. In den `plugins/` Ordner des Servers legen
            3. Server neustarten

            ### Änderungen
            <!-- Hier deine Changelog-Einträge eintragen -->
            - 

            ---
            *Automatisch gebaut mit GitHub Actions*
          files: ${{ env.JAR_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'SNAPSHOT') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}