# ============================================
#        ResourcePackEnforcer - Config
# ============================================

resourcepack:
  # Die direkte Download-URL zum Resourcepack (.zip Datei)
  url: "https://example.com/resourcepack.zip"

  # Fallback-URL falls die primäre URL nicht erreichbar ist.
  # Wird beim Start automatisch geprüft. "none" zum Deaktivieren.
  fallback-url: "none"

  # SHA-1 Hash des Resourcepacks (oder "none")
  hash: "none"

  # Prompt-Nachricht die dem Spieler angezeigt wird (ab 1.17+)
  prompt: "&eBitte akzeptiere das Resourcepack, um den Server zu betreten!"

  # Soll das Resourcepack erzwungen werden? (true = Kick bei Ablehnung)
  enforce: true

  # Verzögerung in Ticks bevor das Pack gesendet wird (20 Ticks = 1 Sekunde)
  send-delay: 20

# ============================================
#           Wiederholungsversuche
# ============================================
reconnect:
  # Wie viele Versuche bekommt ein Spieler bevor er gekickt wird?
  # 0 = deaktiviert (sofort kicken)
  max-retries: 2

  # Wartezeit in Sekunden bis das Pack erneut gesendet wird
  retry-delay: 10

# ============================================
#                Nachrichten
# ============================================
messages:
  # Kick-Nachricht wenn alle Versuche aufgebraucht sind
  kick-message: |-
    &c&lResourcepack abgelehnt!
    &7Du musst das Resourcepack akzeptieren,
    &7um diesen Server betreten zu können.
    &8&oTreten Sie dem Server erneut bei und akzeptieren Sie das Pack.

  # Nachricht bei jedem Fehlversuch (Platzhalter: %retries%, %delay%)
  retry-message: "&eResourcepack abgelehnt! Du hast noch &c%retries% Versuch(e)&e. Erneuter Versuch in &c%delay%s&e..."

  # Nachricht wenn alle Versuche aufgebraucht sind
  retry-expired-message: "&cAlle Versuche aufgebraucht. Du wirst vom Server getrennt."

  # Nachricht wenn das Resourcepack erfolgreich geladen wurde
  pack-loaded: "&a&lResourcepack erfolgreich geladen!"

  # Nachricht wenn der Download fehlschlägt
  pack-failed: "&c&lFehler beim Laden des Resourcepacks. Bitte neu verbinden!"

  # Prefix für Admin-Nachrichten
  prefix: "&8[&6ResourcePack&8] &r"

  # Reload-Nachricht
  reload-success: "&aKonfiguration erfolgreich neu geladen!"

  # Nachricht beim manuellen Senden (Platzhalter: %player%)
  pack-sent: "&aDas Resourcepack wurde an %player% gesendet!"